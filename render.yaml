databases:
  - name: sql-reserve-db
    databaseName: banking_system
    plan: free

services:
  - type: web
    name: sql-reserve
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sql-reserve-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "0123456789abcdef0123456789abcdef"
